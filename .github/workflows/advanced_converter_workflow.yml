name: 高级订阅转换

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00
  workflow_dispatch:
    inputs:
      target:
        description: '目标格式'
        default: 'mihomo'
        required: false
      filters:
        description: '过滤规则 (include=香港;exclude=过期)'
        default: ''
        required: false

jobs:
  advanced-convert:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出仓库
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: pip install requests pyyaml
      
    - name: 创建高级转换脚本
      run: |
        cat > advanced_converter.py << 'EOF'
        #!/usr/bin/env python3
        import requests
        import base64
        import yaml
        import re
        
        class AdvancedSubConverter:
            def __init__(self):
                self.nodes = []
                
            def fetch_subscription(self, url):
                try:
                    response = requests.get(url, timeout=10)
                    response.raise_for_status()
                    return response.text
                except Exception as e:
                    print(f"获取订阅失败 {url}: {e}")
                    return ""
            
            def parse_vless(self, vless_url):
                try:
                    if vless_url.startswith('vless://'):
                        vless_url = vless_url[8:]
                    
                    if '@' in vless_url:
                        auth_part, server_part = vless_url.split('@', 1)
                    else:
                        return None
                    
                    if ':' in auth_part:
                        uuid_str, params = auth_part.split(':', 1)
                    else:
                        uuid_str = auth_part
                        params = ""
                    
                    if ':' in server_part:
                        server, port = server_part.split(':', 1)
                        if '?' in port:
                            port, query = port.split('?', 1)
                        else:
                            query = ""
                    else:
                        return None
                    
                    params_dict = {}
                    if query:
                        for param in query.split('&'):
                            if '=' in param:
                                key, value = param.split('=', 1)
                                params_dict[key] = value
                    
                    node = {
                        'name': f"{server}:{port}",
                        'type': 'vless',
                        'server': server,
                        'port': int(port),
                        'uuid': uuid_str,
                        'network': params_dict.get('type', 'tcp'),
                        'tls': 'tls' in params_dict,
                        'udp': True
                    }
                    
                    if 'host' in params_dict:
                        node['servername'] = params_dict['host']
                    if 'path' in params_dict:
                        node['path'] = params_dict['path']
                    
                    return node
                    
                except Exception as e:
                    print(f"解析VLESS链接失败: {e}")
                    return None
            
            def process_subscription(self, content):
                try:
                    decoded = base64.b64decode(content).decode('utf-8')
                    content = decoded
                except:
                    pass
                
                for line in content.splitlines():
                    line = line.strip()
                    if not line or line.startswith('#'):
                        continue
                    
                    if line.startswith('vless://'):
                        node = self.parse_vless(line)
                        if node:
                            self.nodes.append(node)
            
            def apply_filters(self, filter_rules):
                if not filter_rules:
                    return
                
                filters = []
                for rule in filter_rules.split(';'):
                    if '=' in rule:
                        key, value = rule.split('=', 1)
                        filters.append({'type': key, 'value': value})
                
                for filter_rule in filters:
                    filter_type = filter_rule['type']
                    filter_value = filter_rule['value']
                    
                    if filter_type == 'include':
                        self.nodes = [n for n in self.nodes if filter_value in n['name']]
                    elif filter_type == 'exclude':
                        self.nodes = [n for n in self.nodes if filter_value not in n['name']]
                    elif filter_type == 'regex':
                        self.nodes = [n for n in self.nodes if re.search(filter_value, n['name'])]
            
            def fix_duplicate_names(self):
                name_count = {}
                for node in self.nodes:
                    original_name = node['name']
                    if original_name in name_count:
                        name_count[original_name] += 1
                        node['name'] = f"{original_name}_{name_count[original_name]}"
                    else:
                        name_count[original_name] = 1
            
            def generate_config(self):
                config = {
                    'port': 7890,
                    'socks-port': 7891,
                    'mode': 'Rule',
                    'proxies': self.nodes,
                    'proxy-groups': [
                        {
                            'name': '🚀 自动选择',
                            'type': 'url-test',
                            'proxies': [node['name'] for node in self.nodes],
                            'url': 'http://www.gstatic.com/generate_204',
                            'interval': 300
                        }
                    ],
                    'rules': [
                        'GEOIP,CN,DIRECT',
                        'MATCH,🚀 自动选择'
                    ]
                }
                
                return yaml.dump(config, allow_unicode=True, sort_keys=False)
            
            def convert(self, sub_urls, filters=None):
                print("开始高级订阅转换...")
                
                for url in sub_urls:
                    print(f"处理订阅: {url}")
                    content = self.fetch_subscription(url)
                    if content:
                        self.process_subscription(content)
                
                print(f"原始节点数: {len(self.nodes)}")
                
                # 应用过滤器
                if filters:
                    self.apply_filters(filters)
                    print(f"过滤后节点数: {len(self.nodes)}")
                
                # 修复重复名称
                self.fix_duplicate_names()
                
                # 生成配置
                config = self.generate_config()
                
                return config
        
        # 使用示例
        if __name__ == "__main__":
            import sys
            
            converter = AdvancedSubConverter()
            
            # 订阅链接列表
            subscription_urls = [
                "https://raw.githubusercontent.com/ipx2003/onskr/main/proxies.txt"
            ]
            
            # 获取命令行参数
            filters = sys.argv[1] if len(sys.argv) > 1 else None
            
            # 执行转换
            config = converter.convert(subscription_urls, filters)
            
            # 输出配置
            print(config)
        EOF
      
    - name: 运行高级转换
      run: |
        # 获取输入参数
        FILTERS="${{ inputs.filters }}"
        
        # 运行转换脚本
        python advanced_converter.py "$FILTERS" > mihomo_config.yaml
        
        echo "转换完成，节点数量: $(grep -c "^  - name:" mihomo_config.yaml || echo 0)"
      
    - name: 推送到目标仓库
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        REPO_URL="https://${{ secrets.PAT }}@github.com/ipx2003/wuya.git"
        git clone $REPO_URL wuya-repo
        cd wuya-repo
        
        cp ../mihomo_config.yaml ./mihomo_advanced.yaml
        git add mihomo_advanced.yaml
        git commit -m "高级转换版 $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
        
    - name: 显示结果
      run: |
        echo "✅ 高级订阅转换完成！"
        echo "订阅链接: https://raw.githubusercontent.com/ipx2003/wuya/main/mihomo_advanced.yaml"
        echo "节点数量: $(grep -c "^  - name:" mihomo_config.yaml || echo 0)"