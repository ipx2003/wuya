name: 支持VLESS的自动转换

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  convert-to-mihomo:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出当前仓库
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: pip install requests pyyaml
      
    - name: 创建支持VLESS的转换脚本
      run: |
        cat > convert.py << 'EOF'
        import requests
        import yaml
        import base64
        from urllib.parse import unquote, urlparse, parse_qs
        
        def parse_ss_url(ss_url):
            """解析SS链接"""
            ss_url = ss_url.strip()
            if not ss_url.startswith('ss://'):
                return None
            
            ss_url = ss_url[5:]
            
            remark = "SS_Node"
            if '#' in ss_url:
                url_part, remark = ss_url.split('#', 1)
            else:
                url_part = ss_url
            
            try:
                if '@' in url_part:
                    auth_part, server_part = url_part.split('@', 1)
                    
                    if ':' in server_part:
                        host, port_str = server_part.split(':', 1)
                        try:
                            port = int(port_str)
                        except:
                            port = 8388
                    else:
                        host, port = server_part, 8388
                    
                    if ':' in auth_part:
                        cipher, password = auth_part.split(':', 1)
                    else:
                        try:
                            decoded = base64.urlsafe_b64decode(auth_part + '===').decode('utf-8')
                            if ':' in decoded:
                                cipher, password = decoded.split(':', 1)
                            else:
                                cipher, password = 'aes-256-gcm', decoded
                        except:
                            cipher, password = 'aes-256-gcm', auth_part
                
                else:
                    host, port = "", 8388
                    try:
                        decoded = base64.urlsafe_b64decode(url_part + '===').decode('utf-8')
                        if '@' in decoded:
                            auth_part, server_part = decoded.split('@', 1)
                            if ':' in server_part:
                                host, port_str = server_part.split(':', 1)
                                port = int(port_str)
                            if ':' in auth_part:
                                cipher, password = auth_part.split(':', 1)
                            else:
                                cipher, password = 'aes-256-gcm', auth_part
                        elif ':' in decoded:
                            cipher, password = decoded.split(':', 1)
                        else:
                            cipher, password = 'aes-256-gcm', decoded
                    except:
                        cipher, password = 'aes-256-gcm', url_part
                
                # 解码URL编码的名称
                decoded_remark = unquote(remark)
                
                return {
                    'name': decoded_remark.strip(),
                    'type': 'ss',
                    'server': host or '127.0.0.1',
                    'port': port,
                    'cipher': cipher.lower(),
                    'password': password,
                    'udp': True
                }
                
            except Exception as e:
                print(f"SS解析失败 {ss_url}: {e}")
                return None
        
        def parse_vless_url(vless_url):
            """解析VLESS链接"""
            vless_url = vless_url.strip()
            if not vless_url.startswith('vless://'):
                return None
            
            vless_url = vless_url[8:]  # 移除vless://
            
            # 分离备注
            remark = "VLESS_Node"
            if '#' in vless_url:
                url_part, remark = vless_url.split('#', 1)
            else:
                url_part = vless_url
            
            try:
                # 解析URL部分
                if '@' in url_part:
                    # 格式: uuid@host:port?query#remark
                    uuid_part, server_part = url_part.split('@', 1)
                    
                    if '?' in server_part:
                        server_part, query_part = server_part.split('?', 1)
                    else:
                        query_part = ''
                    
                    if ':' in server_part:
                        host, port_str = server_part.split(':', 1)
                        try:
                            port = int(port_str)
                        except:
                            port = 443
                    else:
                        host, port = server_part, 443
                    
                    # 解析查询参数
                    query_params = {}
                    if query_part:
                        for param in query_part.split('&'):
                            if '=' in param:
                                key, value = param.split('=', 1)
                                query_params[key] = value
                    
                    # 解码URL编码的名称
                    decoded_remark = unquote(remark)
                    
                    return {
                        'name': decoded_remark.strip(),
                        'type': 'vless',
                        'server': host,
                        'port': port,
                        'uuid': uuid_part,
                        'network': query_params.get('type', 'tcp'),
                        'tls': 'tls' if query_params.get('security') == 'tls' else 'none',
                        'sni': query_params.get('sni', ''),
                        'flow': query_params.get('flow', '')
                    }
                
            except Exception as e:
                print(f"VLESS解析失败 {vless_url}: {e}")
                return None
        
        # 获取订阅
        url = "https://raw.githubusercontent.com/ipx2003/onskr/main/proxies.txt"
        response = requests.get(url)
        all_lines = [line.strip() for line in response.text.split('\n') if line.strip()]
        
        print(f"获取到 {len(all_lines)} 个链接")
        
        # 分别处理SS和VLESS链接
        ss_proxies = []
        vless_proxies = []
        
        for line in all_lines:
            if line.startswith('ss://'):
                config = parse_ss_url(line)
                if config:
                    ss_proxies.append(config)
            elif line.startswith('vless://'):
                config = parse_vless_url(line)
                if config:
                    vless_proxies.append(config)
            else:
                print(f"跳过未知协议: {line[:50]}...")
        
        print(f"成功解析 {len(ss_proxies)} 个SS节点")
        print(f"成功解析 {len(vless_proxies)} 个VLESS节点")
        
        # 合并所有代理
        all_proxies = ss_proxies + vless_proxies
        
        # 创建Mihomo配置
        if all_proxies:
            config = {
                'proxies': all_proxies,
                'proxy-groups': [
                    {
                        'name': 'Auto',
                        'type': 'url-test',
                        'proxies': [p['name'] for p in all_proxies],
                        'url': 'http://www.gstatic.com/generate_204',
                        'interval': 300
                    }
                ],
                'rules': [
                    'GEOIP,CN,DIRECT',
                    'MATCH,Auto'
                ]
            }
            
            with open('mihomo_config.yaml', 'w', encoding='utf-8') as f:
                yaml.dump(config, f, allow_unicode=True)
            
            print("✅ 转换完成（支持SS和VLESS）")
            
            # 显示一些示例节点名称
            print("\n示例节点名称:")
            for i, proxy in enumerate(all_proxies[:5]):
                print(f"  {i+1}. {proxy['name']} ({proxy['type']})")
        else:
            print("❌ 没有解析出有效节点")
        EOF
        
    - name: 运行支持VLESS的转换脚本
      run: python convert.py
        
    - name: 推送到wuya仓库
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        REPO_URL="https://${{ secrets.PAT }}@github.com/ipx2003/wuya.git"
        git clone $REPO_URL wuya-repo
        cd wuya-repo
        
        cp ../mihomo_config.yaml .
        git add mihomo_config.yaml
        git commit -m "支持VLESS协议 $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
        
    - name: 显示成功信息
      run: |
        echo "✅ 自动完成！支持SS和VLESS协议"
        echo "订阅链接: https://raw.githubusercontent.com/ipx2003/wuya/main/mihomo_config.yaml"
