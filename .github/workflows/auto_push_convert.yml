name: 每日自动转换并推送到wuya

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  convert-to-mihomo:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出当前仓库
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: pip install requests pyyaml
      
    - name: 获取订阅并转换
      run: |
        import requests
        import yaml
        import base64
        
        # 获取订阅
        url = "https://raw.githubusercontent.com/ipx2003/onskr/main/proxies.txt"
        response = requests.get(url)
        ss_urls = [line.strip() for line in response.text.split('\n') if line.strip()]
        
        def parse_ss(ss_url):
            try:
                if ss_url.startswith('ss://'):
                    ss_url = ss_url[5:]
                
                remark = "SS_Node"
                if '#' in ss_url:
                    url_part, remark = ss_url.split('#', 1)
                else:
                    url_part = ss_url
                
                if '@' in url_part:
                    auth_part, server = url_part.split('@', 1)
                    if ':' in server:
                        host, port = server.split(':', 1)
                        port = int(port)
                    else:
                        host, port = server, 8388
                else:
                    host, port, auth_part = "", 8388, url_part
                
                if ':' in auth_part:
                    cipher, password = auth_part.split(':', 1)
                else:
                    decoded = base64.b64decode(auth_part + '==').decode('utf-8')
                    cipher, password = decoded.split(':', 1)
                
                return {
                    'name': remark.strip(),
                    'type': 'ss',
                    'server': host,
                    'port': port,
                    'cipher': cipher,
                    'password': password,
                    'udp': True
                }
                
            except:
                return None
        
        proxies = []
        for ss_url in ss_urls:
            config = parse_ss(ss_url)
            if config:
                proxies.append(config)
        
        config = {
            'proxies': proxies,
            'proxy-groups': [
                {
                    'name': 'Auto',
                    'type': 'url-test',
                    'proxies': [p['name'] for p in proxies],
                    'url': 'http://www.gstatic.com/generate_204',
                    'interval': 300
                }
            ],
            'rules': [
                'GEOIP,CN,DIRECT',
                'MATCH,Auto'
            ]
        }
        
        with open('mihomo_config.yaml', 'w') as f:
            yaml.dump(config, f, allow_unicode=True)
        
        print(f"成功转换 {len(proxies)} 个节点")
        
    - name: 推送到wuya仓库
      run: |
        # 配置git
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # 克隆wuya仓库（使用PAT认证）
        git clone https://${{ secrets.PAT }}@github.com/ipx2003/wuya.git wuya-repo
        cd wuya-repo
        
        # 复制配置文件
        cp ../mihomo_config.yaml .
        
        # 提交并推送
        git add mihomo_config.yaml
        git commit -m "自动更新Mihomo配置 $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
        
    - name: 显示成功信息
      run: |
        echo "✅ 自动完成！"
        echo "配置文件已推送至: https://github.com/ipx2003/wuya/blob/main/mihomo_config.yaml"
        echo "订阅链接: https://raw.githubusercontent.com/ipx2003/wuya/main/mihomo_config.yaml"
