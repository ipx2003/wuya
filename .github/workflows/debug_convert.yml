name: 调试转换脚本

on:
  workflow_dispatch:

jobs:
  debug-convert:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出当前仓库
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: pip install requests pyyaml
      
    - name: 下载并检查原始订阅
      run: |
        # 获取原始订阅文件
        curl -s https://raw.githubusercontent.com/ipx2003/onskr/main/proxies.txt -o proxies.txt
        echo "原始订阅文件内容:"
        echo "================"
        head -n 5 proxies.txt
        echo ""
        echo "总行数:"
        wc -l proxies.txt
        
    - name: 创建调试脚本
      run: |
        cat > debug.py << 'EOF'
        import requests
        import yaml
        import base64
        
        # 读取原始订阅文件
        with open('proxies.txt', 'r') as f:
            lines = f.readlines()
        
        print("原始订阅内容示例:")
        for i, line in enumerate(lines[:5]):
            print(f"{i+1}: {line.strip()}")
        
        print("\n开始解析每个链接:")
        print("="*50)
        
        proxies = []
        for i, ss_url in enumerate(lines):
            ss_url = ss_url.strip()
            if not ss_url:
                continue
                
            print(f"\n解析第 {i+1} 个链接: {ss_url}")
            
            try:
                if ss_url.startswith('ss://'):
                    ss_url = ss_url[5:]
                
                # 处理备注
                remark = f"SS_Node_{i+1}"
                if '#' in ss_url:
                    url_part, remark = ss_url.split('#', 1)
                    print(f"  备注: {remark}")
                else:
                    url_part = ss_url
                
                # 解析服务器和认证信息
                if '@' in url_part:
                    auth_part, server = url_part.split('@', 1)
                    print(f"  认证部分: {auth_part}")
                    print(f"  服务器部分: {server}")
                    
                    if ':' in server:
                        host, port = server.split(':', 1)
                        port = int(port)
                    else:
                        host, port = server, 8388
                else:
                    host, port, auth_part = "", 8388, url_part
                
                print(f"  主机: {host}, 端口: {port}")
                
                # 解析加密方式和密码
                if ':' in auth_part:
                    cipher, password = auth_part.split(':', 1)
                    print(f"  加密方式: {cipher}, 密码: {password}")
                else:
                    # Base64解码
                    try:
                        decoded = base64.b64decode(auth_part + '==').decode('utf-8')
                        cipher, password = decoded.split(':', 1)
                        print(f"  Base64解码后: {decoded}")
                        print(f"  加密方式: {cipher}, 密码: {password}")
                    except Exception as e:
                        print(f"  Base64解码失败: {e}")
                        continue
                
                config = {
                    'name': remark.strip(),
                    'type': 'ss',
                    'server': host,
                    'port': port,
                    'cipher': cipher,
                    'password': password,
                    'udp': True
                }
                
                proxies.append(config)
                print(f"  ✅ 解析成功")
                
            except Exception as e:
                print(f"  ❌ 解析失败: {e}")
        
        print(f"\n成功解析 {len(proxies)}/{len(lines)} 个节点")
        
        # 创建Mihomo配置
        if proxies:
            config = {
                'proxies': proxies,
                'proxy-groups': [
                    {
                        'name': 'Auto',
                        'type': 'url-test',
                        'proxies': [p['name'] for p in proxies],
                        'url': 'http://www.gstatic.com/generate_204',
                        'interval': 300
                    }
                ],
                'rules': [
                    'GEOIP,CN,DIRECT',
                    'MATCH,Auto'
                ]
            }
            
            with open('mihomo_config.yaml', 'w') as f:
                yaml.dump(config, f, allow_unicode=True)
            
            print("\n生成的Mihomo配置:")
            print("="*50)
            with open('mihomo_config.yaml', 'r') as f:
                print(f.read())
        else:
            print("❌ 没有成功解析任何节点")
        EOF
        
    - name: 运行调试脚本
      run: python debug.py
        
    - name: 上传调试结果
      uses: actions/upload-artifact@v4
      with:
        name: debug-output
        path: |
          proxies.txt
          mihomo_config.yaml