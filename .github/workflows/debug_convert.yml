name: 调试版本自动转换

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  convert-to-mihomo:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出当前仓库
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: pip install requests pyyaml
      
    - name: 创建调试版转换脚本
      run: |
        cat > convert.py << 'EOF'
        import requests
        import yaml
        import base64
        from urllib.parse import unquote
        import traceback
        
        def make_unique_name(name, existing_names, counter_dict):
            """确保节点名称唯一"""
            try:
                if name not in existing_names:
                    existing_names.add(name)
                    counter_dict[name] = 1
                    return name
                
                # 名称已存在，添加序号
                count = counter_dict.get(name, 1)
                new_name = f"{name}_{count}"
                while new_name in existing_names:
                    count += 1
                    new_name = f"{name}_{count}"
                
                counter_dict[name] = count + 1
                existing_names.add(new_name)
                return new_name
            except Exception as e:
                print(f"名称唯一性处理错误: {e}")
                return name
        
        def parse_ss_url(ss_url, existing_names, counter_dict):
            """解析SS链接"""
            try:
                ss_url = ss_url.strip()
                if not ss_url.startswith('ss://'):
                    return None
                
                ss_url = ss_url[5:]
                
                remark = "SS_Node"
                if '#' in ss_url:
                    url_part, remark = ss_url.split('#', 1)
                else:
                    url_part = ss_url
                
                if '@' in url_part:
                    auth_part, server_part = url_part.split('@', 1)
                    
                    if ':' in server_part:
                        host, port_str = server_part.split(':', 1)
                        try:
                            port = int(port_str)
                        except:
                            port = 8388
                    else:
                        host, port = server_part, 8388
                    
                    if ':' in auth_part:
                        cipher, password = auth_part.split(':', 1)
                    else:
                        try:
                            decoded = base64.urlsafe_b64decode(auth_part + '===').decode('utf-8')
                            if ':' in decoded:
                                cipher, password = decoded.split(':', 1)
                            else:
                                cipher, password = 'aes-256-gcm', decoded
                        except:
                            cipher, password = 'aes-256-gcm', auth_part
                
                else:
                    host, port = "", 8388
                    try:
                        decoded = base64.urlsafe_b64decode(url_part + '===').decode('utf-8')
                        if '@' in decoded:
                            auth_part, server_part = decoded.split('@', 1)
                            if ':' in server_part:
                                host, port_str = server_part.split(':', 1)
                                port = int(port_str)
                            if ':' in auth_part:
                                cipher, password = auth_part.split(':', 1)
                            else:
                                cipher, password = 'aes-256-gcm', auth_part
                        elif ':' in decoded:
                            cipher, password = decoded.split(':', 1)
                        else:
                            cipher, password = 'aes-256-gcm', decoded
                    except:
                        cipher, password = 'aes-256-gcm', url_part
                
                # 解码URL编码的名称
                decoded_remark = unquote(remark)
                
                # 确保名称唯一
                unique_name = make_unique_name(decoded_remark.strip(), existing_names, counter_dict)
                
                return {
                    'name': unique_name,
                    'type': 'ss',
                    'server': host or '127.0.0.1',
                    'port': port,
                    'cipher': cipher.lower(),
                    'password': password,
                    'udp': True
                }
                
            except Exception as e:
                print(f"SS解析失败 {ss_url}: {e}")
                print(traceback.format_exc())
                return None
        
        # 获取订阅
        try:
            url = "https://raw.githubusercontent.com/ipx2003/onskr/main/proxies.txt"
            response = requests.get(url, timeout=30)
            response.raise_for_status()
            all_lines = [line.strip() for line in response.text.split('\n') if line.strip()]
            
            print(f"获取到 {len(all_lines)} 个链接")
            
            # 确保名称唯一
            existing_names = set()
            name_counter = {}
            
            # 只处理SS链接（简化调试）
            ss_urls = [line for line in all_lines if line.startswith('ss://')]
            print(f"其中 {len(ss_urls)} 个是SS链接")
            
            proxies = []
            for i, ss_url in enumerate(ss_urls[:10]):  # 只处理前10个用于调试
                print(f"解析第 {i+1} 个SS链接: {ss_url[:50]}...")
                config = parse_ss_url(ss_url, existing_names, name_counter)
                if config:
                    proxies.append(config)
                    print(f"  ✅ 成功: {config['name']}")
                else:
                    print(f"  ❌ 失败")
            
            print(f"成功解析 {len(proxies)} 个SS节点")
            
            # 创建Mihomo配置
            if proxies:
                config = {
                    'proxies': proxies,
                    'proxy-groups': [
                        {
                            'name': 'Auto',
                            'type': 'url-test',
                            'proxies': [p['name'] for p in proxies],
                            'url': 'http://www.gstatic.com/generate_204',
                            'interval': 300
                        }
                    ],
                    'rules': [
                        'GEOIP,CN,DIRECT',
                        'MATCH,Auto'
                    ]
                }
                
                with open('mihomo_config.yaml', 'w', encoding='utf-8') as f:
                    yaml.dump(config, f, allow_unicode=True)
                
                print("✅ 转换完成（调试版本）")
                print(f"生成 {len(proxies)} 个节点")
                
                # 显示配置预览
                print("\n配置文件预览:")
                with open('mihomo_config.yaml', 'r') as f:
                    content = f.read()
                    print(content[:500] + "..." if len(content) > 500 else content)
            else:
                print("❌ 没有解析出有效节点")
                
        except Exception as e:
            print(f"❌ 主程序错误: {e}")
            print(traceback.format_exc())
            exit(1)
        EOF
        
    - name: 运行调试脚本
      run: python convert.py
        
    - name: 上传调试结果
      uses: actions/upload-artifact@v4
      with:
        name: debug-output
        path: |
          mihomo_config.yaml
        
    - name: 显示完成信息
      run: |
        echo "✅ 调试完成！请查看详细日志"
        echo "配置文件已保存在Artifacts中"
