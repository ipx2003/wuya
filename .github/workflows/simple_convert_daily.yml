name: 每日自动转换订阅为Mihomo格式

on:
  schedule:
    - cron: '0 19 * * *'  # 每天UTC时间19:00（北京时间03:00）
  workflow_dispatch:       # 允许手动触发

jobs:
  convert-to-mihomo:
    runs-on: ubuntu-latest
    
    steps:
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: pip install requests pyyaml
      
    - name: 创建转换脚本
      run: |
        cat > convert_to_mihomo.py << 'EOF'
        #!/usr/bin/env python3
        import requests
        import yaml
        import base64
        
        def parse_ss_url(ss_url):
            """简化版SS链接解析"""
            try:
                if ss_url.startswith('ss://'):
                    ss_url = ss_url[5:]
                
                # 处理base64编码部分
                if '@' in ss_url:
                    auth_part, server_part = ss_url.split('@', 1)
                else:
                    auth_part, server_part = ss_url, ""
                
                # 解析服务器
                if ':' in server_part:
                    host, port = server_part.split(':', 1)
                    port = int(port)
                else:
                    host, port = server_part, 8388
                
                # 解析认证信息
                if ':' in auth_part:
                    method, password = auth_part.split(':', 1)
                else:
                    # base64解码
                    decoded = base64.b64decode(auth_part + '==').decode('utf-8')
                    method, password = decoded.split(':', 1)
                
                # 获取备注
                remark = "SS_Node"
                if '#' in ss_url:
                    _, remark = ss_url.split('#', 1)
                
                return {
                    'name': remark.strip(),
                    'type': 'ss',
                    'server': host,
                    'port': port,
                    'cipher': method,
                    'password': password,
                    'udp': True
                }
                
            except Exception as e:
                print(f"解析失败: {e}")
                return None
        
        def main():
            # 获取订阅
            url = "https://raw.githubusercontent.com/ipx2003/onskr/main/proxies.txt"
            try:
                response = requests.get(url, timeout=30)
                ss_urls = [line.strip() for line in response.text.split('\n') if line.strip()]
                
                proxies = []
                for ss_url in ss_urls:
                    config = parse_ss_url(ss_url)
                    if config:
                        proxies.append(config)
                
                # 创建Mihomo配置
                mihomo_config = {
                    'proxies': proxies,
                    'proxy-groups': [
                        {
                            'name': 'Auto',
                            'type': 'url-test',
                            'proxies': [p['name'] for p in proxies],
                            'url': 'http://www.gstatic.com/generate_204',
                            'interval': 300
                        }
                    ],
                    'rules': [
                        'GEOIP,CN,DIRECT',
                        'MATCH,Auto'
                    ]
                }
                
                with open('mihomo_config.yaml', 'w', encoding='utf-8') as f:
                    yaml.dump(mihomo_config, f, allow_unicode=True)
                
                print(f"✅ 转换完成: {len(proxies)} 个节点")
                
            except Exception as e:
                print(f"❌ 错误: {e}")
        
        if __name__ == "__main__":
            main()
        EOF
        
    - name: 运行转换脚本
      run: python convert_to_mihomo.py
      
    - name: 上传配置文件
      uses: actions/upload-artifact@v4
      with:
        name: mihomo-config
        path: mihomo_config.yaml
        
    - name: 输出Raw链接
      run: |
        echo "Mihomo配置Raw链接:"
        echo "https://raw.githubusercontent.com/ipx2003/onskr/main/mihomo_config.yaml"
        echo ""
        echo "请手动保存 mihomo_config.yaml 文件到wuya仓库"
