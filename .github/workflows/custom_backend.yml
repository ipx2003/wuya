name: V2raySE在线转换

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00
  workflow_dispatch:

jobs:
  v2rayse-convert:
    runs-on: ubuntu-latest
    
    steps:
    - name: 使用V2raySE在线转换
      run: |
        SUB_URL="https://raw.githubusercontent.com/ipx2003/onskr/main/proxies.txt"
        
        # 尝试多个可能的API端点
        API_ENDPOINTS=(
          "https://v2rayse.com/api/convert?url=$SUB_URL&target=clash"
          "https://api.v2rayse.com/sub?url=$SUB_URL&target=clash"
          "https://v2rayse.com/convert?url=$SUB_URL&format=clash"
        )
        
        SUCCESS=false
        
        for API_URL in "${API_ENDPOINTS[@]}"; do
          echo "尝试端点: $(echo $API_URL | cut -d'/' -f3)"
          
          # 尝试请求
          if curl -s --fail --connect-timeout 30 "$API_URL" -o mihomo_config.yaml; then
            if [ -s mihomo_config.yaml ] && grep -q "proxies:" mihomo_config.yaml; then
              echo "✅ V2raySE转换成功"
              SUCCESS=true
              break
            else
              echo "⚠️ 响应内容无效，尝试下一个端点"
              rm -f mihomo_config.yaml
            fi
          else
            echo "❌ 请求失败，尝试下一个端点"
          fi
          
          sleep 2
        done
        
        if [ "$SUCCESS" = false ]; then
          echo "❌ 所有V2raySE端点都失败"
          echo "尝试手动网页转换..."
          
          # 备用方案：使用网页界面参数
          MANUAL_URL="https://v2rayse.com/node-convert?subscribe=$SUB_URL&type=clash"
          echo "请手动访问: $MANUAL_URL"
          echo "然后将生成的配置保存为 mihomo_config.yaml"
          exit 1
        fi
        
        echo "文件大小: $(wc -l < mihomo_config.yaml) 行"
      
    - name: 验证配置格式
      run: |
        # 验证YAML格式
        if python3 -c "import yaml; yaml.safe_load(open('mihomo_config.yaml').read())" 2>/dev/null; then
          echo "✅ YAML格式验证成功"
          echo "节点数量: $(grep -c "^  - name:" mihomo_config.yaml)"
        else
          echo "❌ YAML格式验证失败"
          echo "=== 文件前5行 ==="
          head -5 mihomo_config.yaml
          exit 1
        fi
      
    - name: 推送到目标仓库
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        REPO_URL="https://${{ secrets.PAT }}@github.com/ipx2003/wuya.git"
        git clone $REPO_URL wuya-repo
        cd wuya-repo
        
        cp ../mihomo_config.yaml ./mihomo_v2rayse.yaml
        git add mihomo_v2rayse.yaml
        git commit -m "V2raySE在线转换 $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
        
    - name: 显示结果
      run: |
        echo "✅ V2raySE在线转换完成！"
        echo "订阅链接: https://raw.githubusercontent.com/ipx2003/wuya/main/mihomo_v2rayse.yaml"
        echo "节点数量: $(grep -c "^  - name:" mihomo_config.yaml)"
