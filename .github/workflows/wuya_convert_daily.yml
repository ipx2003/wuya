name: 每日自动转换订阅为Mihomo格式

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  convert-to-mihomo:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出wuya仓库
      uses: actions/checkout@v4
      with:
        repository: ipx2003/wuya
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: pip install requests pyyaml
      
    - name: 创建转换脚本
      run: |
        cat > convert_to_mihomo.py << 'EOF'
        #!/usr/bin/env python3
        import requests
        import yaml
        import base64
        
        def parse_ss_url(ss_url):
            try:
                if ss_url.startswith('ss://'):
                    ss_url = ss_url[5:]
                
                if '@' in ss_url:
                    auth_part, server_part = ss_url.split('@', 1)
                else:
                    auth_part, server_part = ss_url, ""
                
                if ':' in server_part:
                    host, port = server_part.split(':', 1)
                    port = int(port)
                else:
                    host, port = server_part, 8388
                
                if ':' in auth_part:
                    method, password = auth_part.split(':', 1)
                else:
                    decoded = base64.b64decode(auth_part + '==').decode('utf-8')
                    method, password = decoded.split(':', 1)
                
                remark = "SS_Node"
                if '#' in ss_url:
                    _, remark = ss_url.split('#', 1)
                
                return {
                    'name': remark.strip(),
                    'type': 'ss',
                    'server': host,
                    'port': port,
                    'cipher': method,
                    'password': password,
                    'udp': True
                }
                
            except Exception as e:
                return None
        
        def main():
            url = "https://raw.githubusercontent.com/ipx2003/onskr/main/proxies.txt"
            try:
                response = requests.get(url, timeout=30)
                ss_urls = [line.strip() for line in response.text.split('\n') if line.strip()]
                
                proxies = []
                for ss_url in ss_urls:
                    config = parse_ss_url(ss_url)
                    if config:
                        proxies.append(config)
                
                mihomo_config = {
                    'proxies': proxies,
                    'proxy-groups': [
                        {
                            'name': 'Auto',
                            'type': 'url-test',
                            'proxies': [p['name'] for p in proxies],
                            'url': 'http://www.gstatic.com/generate_204',
                            'interval': 300
                        }
                    ],
                    'rules': [
                        'GEOIP,CN,DIRECT',
                        'MATCH,Auto'
                    ]
                }
                
                with open('mihomo_config.yaml', 'w', encoding='utf-8') as f:
                    yaml.dump(mihomo_config, f, allow_unicode=True)
                
            except Exception as e:
                print(f"Error: {e}")
        
        if __name__ == "__main__":
            main()
        EOF
        
    - name: 运行转换脚本
      run: python convert_to_mihomo.py
      
    - name: 提交到wuya仓库
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add mihomo_config.yaml
        git commit -m "自动更新Mihomo配置 $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
